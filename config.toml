# 麦书 (MaiBook) 插件配置
# 字段含义见 README.md 与各项 description。

[plugin]
# 是否启用插件
enabled = true
# 配置版本号（请勿手动随意修改）
config_version = "0.1.0"
# 后台自动续写「总开关」。关闭时即使某本书开启了 autopilot 也不会自动推进。
allow_autopilot = true

[writer]
# 专职写手模型。可填任务名（如 replyer / planner / utils），
# 也可填 model_config.toml 中定义的某个具体模型名（将尝试固定到该模型）。
# 默认 replyer：复用麦麦自己的回复模型，语气最贴合。
writer_model = "replyer"
# 写作温度（越高越发散）
temperature = 0.8
# 单次写作的最大 token 数（<=0 表示交由宿主模型配置决定，固定模型路径下回退为 8000）
max_tokens = 0
# 追加到「人格 + 表达风格」之后的额外写作风格说明（可留空）
style_supplement = ""

[context]
# 组装写作上下文的字符预算上限，超出会优先裁剪较旧的摘要与衔接片段
char_budget = 131072
# 是否在上下文中包含此前章节的滚动摘要
include_rolling_summary = true
# 用于生成章节摘要的任务名（建议用速度快的小模型任务）
summary_task = "utils"

[background]
# 后台续写的轮询间隔（秒），最小 60
interval_seconds = 1800
# 每一轮最多推进多少本书
max_books_per_tick = 1

[storage]
# 数据根目录；留空表示使用插件目录下的 data/
data_dir = ""
